model:
  model_type: fully_conv
  latent_dim: 128
  task_dim: 64    # z_task dims; z_domain gets latent_dim - task_dim
  hidden_channels:
  - 32
  - 64
  - 128
  - 256
  - 256
  - 256
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false
  use_causal_channel: false

training:
  batch_size: 64
  max_epochs: 500
  lr: 1e-4
  beta: 0.07
  weight_decay: 0.0
  gradient_clip_val: 1.0
  precision: 32-true
  log_every_n_steps: 10
  num_workers: 0
  overfit_one_batch: false
  overfit_n: 64
  compute_clean_metrics_train: true
  compute_clean_metrics_val: true
  patience: 40
masking:
  enabled: false
  use_mask_channel: true
  alpha_masked: 0.0
  mode: contiguous
  constraint_mode: frac_and_len
  n_blocks: null
  allow_overlap: false
  mask_frac: 0.1
  block_len: 50
  fill: constant
  gaussian_std: 0.0
  constant_value: -1.0
phenotype:
  pheno_hidden_dim: null
  gamma: 1.0
  pheno_weight_decay: 0.0
domain_adaptation:
  use_grl: false          # adversarial GRL classifier on z_task
  grl_hidden_dim: null
  lambda_max: 1.0
  delta: 5.0              # weight for GRL loss (and MMD if use_mmd=true)
  use_mmd: false          # MMD alignment loss on z_task
  use_domain_clf: true   # cooperative domain classifier on z_domain
  domain_clf_hidden_dim: null
  lam_domain: 1.0         # weight for cooperative domain clf loss
seed: 295
grid:
  enabled: true
  name:
    prefix: "vae"
    sep: "__"
  dims:
        - path: "domain_adaptation.use_domain_clf"
          values: [True, False]
          tag: "domain_clf"
      # - path: "domain_adaptation.delta"
      #   values: [0, 1, 5, 10]
      #   tag: "mmd_delta"
      # - path: "domain_adaptation.use_mmd"
      #   values: [True, False]
      #   tag: "use_mmd"
      # - path: "domain_adaptation.lam_domain"
      #   values: [0, 0.5, 1.0, 1.5, 2, 10]
      #   tag: "domain_clf_lambda"
      # - path: "domain_adaptation.use_domain_clf"
      #   values: [True, False]
      #   tag: "domain_clf"
