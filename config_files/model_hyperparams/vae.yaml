model:
  model_type: "fully_conv"
  latent_dim: 512
  hidden_channels: [32, 64, 128, 256, 256, 256]
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false

training:
  batch_size: 64
  max_epochs: 300
  lr: 1e-4
  beta: 0.07
  weight_decay: 0.0
  gradient_clip_val: 1.0
  precision: "32-true"
  log_every_n_steps: 10
  num_workers: 0
  overfit_one_batch: false
  overfit_n: 64
  compute_clean_metrics_train: true
  compute_clean_metrics_val: true
  patience: 40

masking:
  enabled: false
  use_mask_channel: true
  alpha_masked: 0.0
  mode: "contiguous"
  constraint_mode: "frac_and_len"
  n_blocks: null
  allow_overlap: false
  mask_frac: 0.1
  block_len: 50
  fill: "constant"
  gaussian_std: 0.0
  constant_value: -1.0

phenotype:
  pheno_hidden_dim: null
  gamma: 0.60
  pheno_weight_decay: 0.0

# -------------------------------------------------------------------
# Domain adaptation via Gradient Reversal Layer (DANN-style)
# -------------------------------------------------------------------
# use_grl      : enable/disable the entire domain adaptation pathway
# grl_hidden_dim: hidden units in the domain classifier MLP
# lambda_max   : ceiling for the Ganin et al. reversal schedule
#                  lambda(p) = lambda_max * (2/(1+exp(-10*p)) - 1)
#                where p = epoch / max_epochs  (ramps 0 → lambda_max)
# delta        : base weight on the domain CE loss in the total loss.
#                The actual weight applied each batch is:
#                  effective_delta = delta * domain_accuracy
#                so the encoder is pushed hardest when the classifier
#                is most accurate (latent space still domain-separable).
# -------------------------------------------------------------------
domain_adaptation:
  use_grl: true
  grl_hidden_dim: null
  lambda_max: 1.0
  delta: 1.0

seed: 0

grid:
  enabled: true
  name:
    prefix: "vae_grl"
    sep: "__"
  dims:
    # - path: "phenotype.gamma"
    #   values: [0, 0.15, 0.30, 0.45, 0.60, 0.75, 0.90, 1.0]
    #   tag: "gamma"
    - path: "domain_adaptation.lambda_max"
      values: [0.0, 0.25, 0.5, 0.75, 1.0]
      tag: "lambda_max"