model:
  model_type: fully_conv
  latent_dim: 128
  shared_dim: 64
  hidden_channels:
  - 32
  - 64
  - 128
  - 256
  - 256
  - 256
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false
training:
  batch_size: 64
  max_epochs: 300
  lr: 1e-4
  beta: 0.07
  weight_decay: 0.0
  gradient_clip_val: 1.0
  precision: 32-true
  log_every_n_steps: 10
  num_workers: 0
  overfit_one_batch: false
  overfit_n: 64
  compute_clean_metrics_train: true
  compute_clean_metrics_val: true
  patience: 40
masking:
  enabled: false
  use_mask_channel: true
  alpha_masked: 0.0
  mode: contiguous
  constraint_mode: frac_and_len
  n_blocks: null
  allow_overlap: false
  mask_frac: 0.1
  block_len: 50
  fill: constant
  gaussian_std: 0.0
  constant_value: -1.0
phenotype:
  pheno_hidden_dim: null
  gamma: 2.0
  pheno_weight_decay: 0.0
domain_adaptation:
  use_grl: true
  use_mmd: false
  grl_hidden_dim: null
  lambda_max: 1.0
  delta: 1.0
seed: 0
grid:
  enabled: false
  name:
    prefix: vae_grl
    sep: __
  dims:
  - path: domain_adaptation.use_grl
    values:
    - true
    - false
    tag: use_grl
