model:
  model_type: "fully_conv"
  latent_dim: 128
  hidden_channels: [32, 64, 128, 256, 256, 256]
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false

training:
  batch_size: 64
  max_epochs: 300
  lr: 1e-4
  beta: 0.07
  weight_decay: 0.0
  gradient_clip_val: 1.0
  precision: "32-true"
  log_every_n_steps: 10
  num_workers: 0
  overfit_one_batch: false
  overfit_n: 64
  compute_clean_metrics_train: true
  compute_clean_metrics_val: true
  patience: 40

masking:
  enabled: false
  use_mask_channel: true
  alpha_masked: 0.0
  mode: "contiguous"
  constraint_mode: "frac_and_len"
  n_blocks: null
  allow_overlap: false
  mask_frac: 0.1
  block_len: 50
  fill: "constant"
  gaussian_std: 0.0
  constant_value: -1.0

phenotype:
  pheno_hidden_dim: null
  gamma: 0.6
  pheno_weight_decay: 0.0

domain_adaptation:
  use_grl: false
  grl_hidden_dim: null
  lambda_max: 1.0
  delta: 1.0

seed: 0

grid:
  enabled: true
  name:
    prefix: "vae_gamma"
    sep: "__"
  dims:
    # - path: "phenotype.gamma"
    #   values: [0, 0.15, 0.30, 0.45, 0.60, 0.75, 0.90, 1.0]
    #   tag: "gamma"
    # - path: "domain_adaptation.lambda_max"
    #   values: [0.0, 0.25, 0.5, 0.75, 1.0]
    #   tag: "lambda_max"
    # - path: "training.beta"
    #   values: [ 0.001, 0.01, 0.07, 0.1, 0.3]
    #   tag: "beta"
    # - path: model.latent_dim
    #   values: [256, 512, 1024]
    #   tag: "latent_dim"
    - path: phenotype.gamma
      values: [0.6, 1.0]
      tag: "gamma"