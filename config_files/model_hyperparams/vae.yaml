model:
  model_type: "fully_conv"
  latent_dim_shared: 256      # domain-invariant subspace (GRL + pheno head)
  latent_dim_private: 256     # population-specific subspace (decoder only)
  hidden_channels: [32, 64, 128, 256, 256, 256]
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false

training:
  batch_size: 64
  max_epochs: 300
  lr: 1e-4
  beta: 0.07
  weight_decay: 0.0
  gradient_clip_val: 1.0
  patience: 40
  min_delta: 1e-4
  log_every_n_steps: 10
  num_workers: 0

masking:
  enabled: false
  use_mask_channel: true
  alpha_masked: 0.0
  mode: "contiguous"
  constraint_mode: "frac_and_len"
  n_blocks: null
  allow_overlap: false
  mask_frac: 0.1
  block_len: 50
  fill: "constant"
  gaussian_std: 0.0
  constant_value: -1.0

phenotype:
  pheno_hidden_dim: null
  gamma: 0.60
  pheno_weight_decay: 0.0

# -------------------------------------------------------------------
# Domain adaptation (GRL on shared subspace only)
# -------------------------------------------------------------------
# grl_hidden_dim: null → single linear classifier (recommended starting point)
# lambda_max     : Ganin schedule ceiling; ramps 0 → lambda_max over training
# delta          : base weight on domain CE; effective = delta * domain_acc
# -------------------------------------------------------------------
domain_adaptation:
  use_grl: true
  grl_hidden_dim: null
  lambda_max: 1.0
  delta: 1.0

seed: 0

grid:
  enabled: false
  name:
    prefix: "vae"
    sep: "__"
  dims:
    - path: "phenotype.gamma"
      values: [0.0, 0.30, 0.60, 1.0]
      tag: "gamma"